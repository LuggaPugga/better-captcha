name: Playwright Tests
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        project: [react, solidjs, vue, qwik, svelte, lit, preact] 
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "26"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Core
        run: bun run --cwd packages/core build

      - name: Build package
        run: bun run --cwd packages/${{ matrix.project }} build

      - name: Install Playwright Browsers
        run: bun --cwd packages/${{ matrix.project }} playwright install --with-deps

      - name: Run Playwright tests
        run: bun --cwd packages/${{ matrix.project }} playwright test

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.project }}
          path: packages/${{ matrix.project }}/playwright-report/
          retention-days: 30